# Global Site Settings
url: "https://bomin-keum.github.io"
baseurl: ""
repository: "bomin-keum/bomin-keum.github.io"
remote_theme: "mmistakes/minimal-mistakes" # THIS IS THE KEY CHANGE
minimal_mistakes_skin: "default"

# Theme Settings
search: false
layout: single
author_profile: true

# Removes the top navigation bar
masthead:
  enabled: false
header:
  overlay_color: "#ffffff"
  show_overlay_excerpt: false

# tells the theme NOT to use the top-nav data
navigation:
  - title: ""
    url: ""

# Top Left Name and Affiliation
title: "Bo Min Keum"
name: "Bo Min Keum"
description: "PhD Student <br> International Cybercrime Research Institute, SFU"

author:
  name: "Bomin Keum"
  bio: "PhD Student, International Cybercrime Research Institute, SFU"
  location: "Canada"
  links:
    - label: "About"
      icon: "fas fa-fw fa-user"
      url: "/#about"
    - label: "Research"
      icon: "fas fa-fw fa-book"
      url: "/#research"
    - label: "CV"
      icon: "fas fa-fw fa-file-pdf"
      url: "/#cv"
    - label: "Contact"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:your-email@sfu.ca"

# Make publications appear
collections:
  publications:
    output: true
    permalink: /:collection/:path/

#force theme
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "single"
      author_profile: true
      sidebar:
        nav: "main"
