# 1. Global Site Settings (The "Infrastructure")
url: "https://bomin-keum.github.io"
baseurl: ""
repository: "bomin-keum/bomin-keum.github.io"
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "default"

# 2. Top Navigation (The "Top Row" links)
masthead_links:
  - title: "About"
    url: "#about"
  - title: "Research"
    url: "#research"
  - title: "CV"
    url: "#cv"
  - title: "Contact"
    url: "#contact"

# 3. Sidebar & Profile (Your personal info)
author:
  name: "Bomin Keum"
  bio: "PhD Student <br> ICCRI, SFU"
  location: "Canada"
  follow_button: false # Standard for academic sites to keep it clean

# 4. Theme Settings
search: false
words_per_minute: 200

# 5. Collections (Ensures your research papers show up)
collections:
  publications:
    output: true
    permalink: /:collection/:path/

# 6. Defaults (Tells every page to show your sidebar)
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "single"
      author_profile: true
