  name: "Bomin Keum"
  bio: "Hi! I am a PhD student at the International CyberCrime Research Institute in Simon Fraser University, examining online radicalization and violent extremism. My research so far examined radicalization patterns. Now, I evaluate what works to disrupt these patterns. I do so by engaging in computational methods for distinguishing “Violent” and “Non-Violent” user patterns, conducting a Campbell Systematic Review of radicalization prevention programs, and interviewing formers."
