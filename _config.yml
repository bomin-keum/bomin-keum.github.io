title: "Bo Min Keum"
subtitle: "ICCRI, SFU"
url: "https://bomin-keum.github.io"
baseurl: "" # Keep this explicitly empty
remote_theme: "mmistakes/minimal-mistakes"

# Top Navigation
masthead_links:
  - title: "About"
    url: "/#about"
  - title: "Research"
    url: "/#research"
  - title: "CV"
    url: "/cv/"
  - title: "Contact"
    url: "/#contact"

# Force Jekyll to include the CV file
include:
  - cv.md

collections:
  publications:
    output: true
    permalink: /:collection/:path/

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "single"
      author_profile: false
