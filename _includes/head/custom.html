{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<style>
  /* 1. This centers the content and gives it a healthy max width */
  #main {
    max-width: 1280px !important; /* Standard centered width */
    margin-left: auto !important;
    margin-right: auto !important;
    padding-left: 1em !important;
    padding-right: 1em !important;
  }

  /* 2. On full-screen/large monitors, expand it further */
  @media (min-width: 80em) {
    #main {
      max-width: 1600px !important; 
    }
  }

  /* 3. Force the internal containers to fill that #main space */
  .archive, .page, .page__content, .page__inner-wrap {
    width: 100% !important;
    max-width: 100% !important;
  }

  /* 4. Fix the alignment so it starts exactly where 'Bo Min Keum' starts */
  .masthead__inner {
    max-width: 1280px !important;
    margin-left: auto !important;
    margin-right: auto !important;
  }
  
  @media (min-width: 80em) {
    .masthead__inner {
      max-width: 1600px !important;
    }
  }

  /* 5. Mobile Fix: prevent overlap and add breathing room */
  @media (max-width: 64em) {
    .sidebar {
      display: none !important;
    }
    #main {
      padding-left: 20px !important;
      padding-right: 20px !important;
    }
  }
</style>
