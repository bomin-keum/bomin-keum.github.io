<style>
  /* 1. Align main content perfectly with the navigation bar edges */
  #main {
    max-width: 1280px !important; /* Matches standard Minimal Mistakes nav width */
    margin: 0 auto !important;
    padding: 0 !important;
  }

  .archive, .page, .page__content {
    width: 100% !important;
    padding-right: 0 !important;
    padding-left: 0 !important;
  }

  /* 2. Fix the PDF Embed to hide the 'Page Thumbnails' sidebar */
  /* Adding #toolbar=0&navpanes=0 to the URL is the trick! */
  .cv-embed-container iframe {
    width: 100% !important;
    height: 1100px;
    border: none;
  }

  /* 3. Ensure the Sidebar (Bio) doesn't push content left */
  .sidebar {
    margin-right: 2em !important;
  }
