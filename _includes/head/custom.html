{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<style>
  /* 1. Make the main wrapper match the header's container exactly */
  #main {
    max-width: 100% !important;
    padding: 0 !important;
    margin: 0 !important;
  }

  /* 2. Target the inner content and align it with the Masthead (Header) */
  .archive, .page, .page__content {
    width: 100% !important;
    max-width: 100% !important;
  }

  /* 3. This is the 'Secret Sauce': 
     We use the theme's own padding logic to align with the name 'Bo Min Keum' */
  .inner {
    max-width: 95% !important; /* Matches the width we want */
    margin-left: auto !important;
    margin-right: auto !important;
  }

  /* 4. Fix the Sidebar/Follow overlap on mobile */
  @media (max-width: 64em) {
    .sidebar {
      display: none !important;
    }
  }

  /* 5. Force the content to extend to the right edge */
  .page__inner-wrap {
    width: 100% !important;
  }
</style>
