{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<style>
  /* 1. Center the entire page container */
  #main {
    display: flex !important;
    justify-content: center !important; /* This is the 'Center' command */
    max-width: 100% !important;
    margin: 0 auto !important;
    padding: 0 5% !important; /* Gives breathing room on both sides */
  }

  /* 2. Make the inner wrapper take up the available space */
  .inner {
    width: 100% !important;
    max-width: 1400px !important; /* Limits how far it spreads on huge screens */
    display: flex !important;
    flex-direction: row !important;
    align-items: flex-start !important;
  }

  /* 3. Ensure the content area fills the right side properly */
  .archive, .page, .page__content {
    flex-grow: 1 !important;
    width: auto !important;
    max-width: 100% !important;
  }

  /* 4. Keep your name and navigation bar centered/aligned as well */
  .masthead__inner {
    max-width: 1400px !important;
    margin: 0 auto !important;
    padding: 0 5% !important;
  }

  /* 5. Mobile/Small Screen: Stack things vertically and hide sidebar overlap */
  @media (max-width: 64em) {
    #main {
      flex-direction: column !important;
      padding: 0 20px !important;
    }
    .sidebar {
      display: none !important;
    }
  }
</style>
