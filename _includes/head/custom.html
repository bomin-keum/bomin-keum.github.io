{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>


<style>
  /* [Previous Container & Text Styles...] */

  /* 1. Deepen the Heading Colors for better contrast */
  h1, h2, h3 {
    color: #000 !important; /* Pure black for maximum impact */
    letter-spacing: -0.5px;
    transition: color 0.3s ease; /* Smooth transition when interacting */
  }

  /* 2. Interactive Sections: They "pop" when hovered */
  h3:hover {
    color: #0056b3 !important; /* Subtle blue shift to show interactivity */
    cursor: pointer;
  }

  /* 3. The "Visual Anchor" (Simple border that guides the eye) */
  h3 {
    border-bottom: 2px solid #f2f2f2;
    padding-bottom: 10px;
    margin-top: 2em !important;
  }

  /* 4. Navigation Menu Highlight */
  /* This ensures your top menu (ABOUT, RESEARCH, CV) feels crisp */
  .masthead__menu-item a {
    color: #666 !important;
    transition: all 0.2s ease-in-out;
  }

  .masthead__menu-item a:hover {
    color: #000 !important;
    border-bottom: 2px solid #000;
  }

  /* 5. Refined Body Text */
  p, li {
    color: #333 !important; /* Darker than before for better accessibility */
    font-weight: 400;
  }

  /* 6. Bold your name in research list specifically */
  strong {
    color: #000 !important;
  }
</style>
