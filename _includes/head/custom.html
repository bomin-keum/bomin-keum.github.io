{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<style>
  /* 1. Expand the main container and align with the logo/name at the top */
  #main {
    max-width: 95% !important;
    margin-left: 5% !important; /* Adjust this % to align perfectly with your 'Bo Min Keum' text */
    margin-right: 5% !important;
    padding: 0 !important;
  }

  /* 2. Force the content to fill the remaining space on the right */
  .archive, .page {
    width: 100% !important;
    max-width: 100% !important;
    padding-right: 0 !important;
  }

  /* 3. Fix the "Follow" button (Sidebar) */
  /* This hides the "Follow" button when the screen is small so it doesn't overlap your 'About' section */
  @media (max-width: 64em) {
    .sidebar {
      display: none !important;
    }
  }

  /* 4. Ensure the content doesn't hit a 'invisible wall' on the right */
  .page__content {
    float: none !important;
    width: 100% !important;
    padding-right: 5% !important; /* Keeps it from touching the absolute edge of the screen */
  }

  /* 5. Align the page title (About, Research, etc.) with the sidebar/header */
  .page__title {
    margin-top: 0 !important;
  }
</style>
