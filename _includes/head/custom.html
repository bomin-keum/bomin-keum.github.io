{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>


<style>
  /* 1. Global Container Fixes (Centered & Balanced) */
  #main {
    max-width: 1100px !important; /* Slightly narrower for better readability */
    margin: 0 auto !important;
    padding: 40px 20px !important;
  }

  .sidebar { display: none !important; }

  /* 2. Heading Styles (Darker & Bold) */
  h1, h2, h3, h4 {
    color: #111 !important; /* Deep black for high contrast */
    font-weight: 800 !important; /* Extra bold */
    margin-top: 1.5em !important;
    margin-bottom: 0.5em !important;
  }

  /* Specific sizing to create contrast */
  h1 { font-size: 2.2em !important; } /* Page Title like "About" */
  h3 { font-size: 1.4em !important; border-bottom: 1px solid #eee; padding-bottom: 5px; } /* Section headers like "Published" */

  /* 3. Body Text Styles (Clean & Slightly Muted) */
  p, li, div {
    color: #444 !important; /* Slightly softer grey for long-form reading */
    font-size: 1.05em !important;
    line-height: 1.6 !important;
  }

  /* 4. Hyperlink Styling */
  a {
    color: #0056b3 !important;
    text-decoration: none;
  }
  a:hover { text-decoration: underline; }

  /* 5. Navigation Bar (Top) Alignment */
  .masthead__inner {
    max-width: 1100px !important;
    margin: 0 auto !important;
    border-bottom: 1px solid #f2f2f2;
  }

  .masthead__menu-item a {
    font-weight: 700 !important;
    color: #333 !important;
    text-transform: uppercase;
    font-size: 0.9em !important;
  }

  /* 6. CV Embed Refinement */
  .cv-embed-container iframe {
    width: 100% !important;
    border-radius: 4px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05); /* Adds a professional subtle shadow */
  }
</style>
