{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>


<style>
  /* 1. Kill the Sidebar footprint entirely to prevent the "Shifted Left" look */
  .sidebar {
    display: none !important;
  }

  /* 2. Center the main container and align with the name 'Bo Min Keum' */
  #main {
    max-width: 1280px !important;
    margin: 0 auto !important;
    padding: 0 40px !important; /* Healthy breathing room so it's not suffocating */
    display: block !important; 
  }

  /* 3. Force the content to take up 100% of the centered #main container */
  .archive, .page, .page__content, .page__inner-wrap {
    width: 100% !important;
    max-width: 100% !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  /* 4. Ensure the navigation bar (Masthead) uses the exact same centering math */
  .masthead__inner {
    max-width: 1280px !important;
    margin: 0 auto !important;
    padding: 0 40px !important;
  }

  /* 5. Clean up the CV Embed */
  .cv-embed-container iframe {
    width: 100% !important;
    border: 1px solid #eee;
  }
</style>
